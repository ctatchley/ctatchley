<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Share a Recipe</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <header class="masthead">
      <div>
        <p class="eyebrow">Community kitchen</p>
        <h1>Share a Recipe</h1>
      </div>
      <nav class="top-nav" aria-label="Primary">
        <a class="nav-link" href="/">Browse</a>
        <a class="nav-button active" href="/submit">Share recipe</a>
      </nav>
    </header>

    <main class="submit-layout">
      <section class="submit-panel">
        <h2>Recipe details</h2>
        <form id="recipeForm">
          <label>
            Recipe name
            <input name="title" required maxlength="120" placeholder="Lemon pasta">
          </label>
          <label>
            Category
            <select name="category" id="categorySelect" required>
              <option value="">Choose a category</option>
            </select>
          </label>
          <label>
            Ingredients
            <textarea name="ingredients" required rows="5" placeholder="One ingredient per line"></textarea>
          </label>
          <label>
            Instructions
            <textarea name="instructions" required rows="6" placeholder="Write the cooking steps"></textarea>
          </label>
          <label>
            Photo
            <input name="image" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
          </label>
          <button type="submit">Post recipe</button>
          <p class="form-message" id="formMessage" role="status"></p>
        </form>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
